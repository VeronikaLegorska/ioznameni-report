<style>
#auth-overlay {
  position:fixed;inset:0;background:#fff;z-index:9999;
  display:flex;align-items:center;justify-content:center;
}
#auth-box {
  text-align:center;padding:40px 48px;border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.12);max-width:340px;width:100%;
}
#auth-box h2 { margin:0 0 8px;font-size:22px;color:#1a1a1a; }
#auth-box p  { margin:0 0 24px;color:#767676;font-size:14px; }
#auth-pwd {
  width:100%;box-sizing:border-box;padding:12px 16px;font-size:15px;
  border:2px solid #E8E8E8;border-radius:8px;outline:none;
  transition:border .2s;
}
#auth-pwd:focus { border-color:#D61E64; }
#auth-btn {
  margin-top:12px;width:100%;padding:12px;font-size:15px;font-weight:600;
  background:#D61E64;color:#fff;border:none;border-radius:8px;cursor:pointer;
  transition:opacity .2s;
}
#auth-btn:hover { opacity:.88; }
#auth-err { margin-top:12px;color:#D61E64;font-size:13px;min-height:18px; }
</style>
<script>
// Desifrovani AES-256-GCM (PBKDF2 klic z hesla)
async function _deriveKey(password, salt) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password),
    "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:100000, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
}
async function decryptBlob(b64, password) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16), nonce = raw.slice(16, 28), ct = raw.slice(28);
  const key = await _deriveKey(password, salt);
  const dec = await crypto.subtle.decrypt({name:"AES-GCM", iv:nonce}, key, ct);
  return JSON.parse(new TextDecoder().decode(dec));
}

let _decryptedData = null;
let _encBlob = null;

// Nacteme zasifrovana data ihned (ale nezobrazime)
fetch(`data/all_data.enc?t=${Date.now()}`).then(r => r.text()).then(t => { _encBlob = t; });

document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("auth-overlay").style.display = "flex";
  document.getElementById("auth-pwd").focus();
});

async function _authCheck() {
  const pwd = document.getElementById("auth-pwd").value;
  const btn = document.getElementById("auth-btn");
  const err = document.getElementById("auth-err");
  if (!pwd) return;
  btn.textContent = "Dešifruji…"; btn.disabled = true;
  try {
    if (!_encBlob) _encBlob = await fetch(`data/all_data.enc?t=${Date.now()}`).then(r => r.text());
    _decryptedData = await decryptBlob(_encBlob, pwd);
    sessionStorage.setItem("ioz_pwd", pwd);
    document.getElementById("auth-overlay").style.display = "none";
    if (window._initDashboard) window._initDashboard(_decryptedData);
  } catch(e) {
    err.textContent = "Špatné heslo, zkus znovu.";
    document.getElementById("auth-pwd").value = "";
    document.getElementById("auth-pwd").focus();
    btn.textContent = "Vstoupit"; btn.disabled = false;
  }
}
window._authCheck = _authCheck;
window._authKey = function(e){ if(e.key==="Enter") _authCheck(); };
</script>

<script>
// ── UTILS ──────────────────────────────────────────────────────────────────
const f = (v,cur) => v ? v.toLocaleString('cs-CZ',{minimumFractionDigits:0,maximumFractionDigits:0})+' '+(cur||'Kč') : '—';
const fn = v => v ? v.toLocaleString('cs-CZ') : '—';
const fpct = (a,b) => b>0 ? (a/b*100).toFixed(2)+'%' : '—';
const fcpc = (s,n) => n>0 ? (s/n).toFixed(2) : '—';

function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; }
const todayStr = fmtDate(new Date());

const ICONS = {
  gads: `<svg class="plat-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="48" fill="#fff" rx="7"/><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#EA4335" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.37-.76-2.83-.76-4.59s.27-3.22.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.83l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>`,
  meta: `<svg class="plat-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="48" fill="#1877F2" rx="7"/><path fill="#fff" d="M28 48V30h6l1-7h-7v-4c0-2 1-3 4-3h3V9s-3-1-6-1c-7 0-11 4-11 12v5h-6v7h6v18z"/></svg>`,
  sklik:`<svg class="plat-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="48" fill="#cc0000" rx="7"/><text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="20" font-weight="bold" font-family="Arial">SK</text></svg>`,
};
const NAMES = {gads:'Google Ads', meta:'Meta Ads', sklik:'Sklik'};
const COLORS = {gads:'var(--gads)', meta:'var(--meta)', sklik:'var(--sklik)'};
const COLOR_HEX = {gads:'#FDBA01', meta:'#D61E64', sklik:'#6FA32B'};

// ── GLOBAL FILTER STATE ──────────────────────────────────────────────────────
const filterState = { market: 'cz', from: null, to: null, period: '7' };

// ── LOAD DATA ──────────────────────────────────────────────────────────────
let allData = null;
let metaStructure = null;

async function loadAllData() {
  if (allData) return allData;
  // Data jsou uz desifrovana v _decryptedData (po uspesnem loginu)
  if (window._decryptedData) { allData = window._decryptedData; }
  try {
    const r2 = await fetch(`data/meta_structure.json?t=${Date.now()}`);
    if (r2.ok) { metaStructure = await r2.json(); }
  } catch(e) {}
  return allData;
}

// Zavolano po uspesnem desifraci — spusti dashboard
window._initDashboard = function(data) {
  window._decryptedData = data;
  allData = data;
  if (window._renderMain) window._renderMain();
};

function attachMetaStructure(market, campaigns) {
  const struct = metaStructure?.[market] || [];
  for (const c of campaigns) {
    const match = struct.find(s => s.name === c.name);
    if (match) { c.adsets = match.adsets; c.is_product = match.is_product; }
  }
  return campaigns;
}

// ── AGGREGATE ────────────────────────────────────────────────────────────────
function aggPlatform(data, market, plat, from, to) {
  const dst = {spend:0,clicks:0,impressions:0,conversions:0,conversionValue:0,campaigns:{}};
  for (const [day, d] of Object.entries(data)) {
    if (day < from || day > to) continue;
    const src = d[market]?.[plat];
    if (!src) continue;
    dst.spend           += src.spend||0;
    dst.clicks          += src.clicks||0;
    dst.impressions     += src.impressions||0;
    dst.conversions     += src.conversions||0;
    dst.conversionValue += src.conversionValue||0;
    for (const c of (src.campaigns||[])) {
      if (!dst.campaigns[c.name]) dst.campaigns[c.name] = {name:c.name,spend:0,clicks:0,impressions:0,conversions:0,conversionValue:0};
      const dc = dst.campaigns[c.name];
      dc.spend           += c.spend||0;
      dc.clicks          += c.clicks||0;
      dc.impressions      += c.impressions||0;
      dc.conversions      += c.conversions||0;
      dc.conversionValue  += c.conversionValue||0;
    }
  }
  dst.spend = Math.round(dst.spend*100)/100;
  let campArr = Object.values(dst.campaigns).sort((a,b)=>b.spend-a.spend);
  if (plat === 'meta') campArr = attachMetaStructure(market, campArr);
  dst.campaigns = campArr;
  return dst;
}

function aggOverview(data, market, plats, from, to) {
  let spend=0, clicks=0, impressions=0, conversions=0, conversionValue=0;
  for (const [day, d] of Object.entries(data)) {
    if (day < from || day > to) continue;
    for (const plat of plats) {
      const src = d[market]?.[plat];
      if (!src) continue;
      spend += src.spend||0; clicks += src.clicks||0;
      impressions += src.impressions||0; conversions += src.conversions||0;
      conversionValue += src.conversionValue||0;
    }
  }
  return {spend:Math.round(spend*100)/100, clicks, impressions, conversions, conversionValue:Math.round(conversionValue*100)/100};
}

function campRow(c, cur, totalSpend, accentColor) {
  const cSpend = Math.round((c.spend||0)*100)/100;
  const cConvval = Math.round((c.conversionValue||0)*100)/100;
  const cConvs = Math.round((c.conversions||0)*10)/10;
  const cClicks = c.clicks||0;
  const pct = totalSpend > 0 ? Math.max(2, Math.round(cSpend/totalSpend*100)) : 0;
  const pnoCls = cConvval > 0
    ? (cSpend/cConvval < 0.35 ? 'camp-pno-good' : cSpend/cConvval < 0.6 ? 'camp-pno-ok' : 'camp-pno-bad')
    : 'camp-zero';
  const pnoTxt = cConvval > 0 ? (cSpend/cConvval*100).toFixed(1)+'%' : '—';
  const convvalTxt = cConvval > 0 ? f(cConvval, cur) : `<span class="camp-zero">${fn(cClicks)} kl</span>`;
  const convsTxt = cConvs > 0 ? (Number.isInteger(cConvs) ? cConvs : cConvs.toFixed(1)) : `<span class="camp-zero">—</span>`;
  return `<tr>
    <td>
      <div class="camp-name-wrap">
        <span class="camp-name-text" title="${c.name}">${c.name}${c.is_product?' 🛒':''}</span>
        <div class="camp-spend-bar-wrap"><div class="camp-spend-bar" style="width:${pct}%;background:${accentColor}"></div></div>
      </div>
    </td>
    <td>${cSpend>0?f(cSpend,cur):'<span class="camp-zero">—</span>'}</td>
    <td>${convvalTxt}</td>
    <td class="${pnoCls}">${pnoTxt}</td>
    <td>${convsTxt}</td>
  </tr>`;
}

function barChartHtml(byPlat, cur) {

    return `

  return `<div class="bar-chart">${cols}</div>`;
}

function donutSVG(parts) {
  const total = parts.reduce((s,p)=>s+p.value,0);
  const cx=70, cy=70, rOuter=68, rInner=42;
  if (!total) return `<svg width="140" height="140" viewBox="0 0 140 140"><circle cx="${cx}" cy="${cy}" r="${rOuter}" fill="#F0F0F2"/><circle cx="${cx}" cy="${cy}" r="${rInner}" fill="#fff"/></svg>`;
  const polar = (r,deg) => { const a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
  let angle = 0, paths = '';
  for (const p of parts) {
    if (p.value<=0) continue;
    const slice = (p.value/total)*360;
    const [x1,y1] = polar(rOuter,angle), [x2,y2] = polar(rOuter,angle+slice);
    const [ix2,iy2] = polar(rInner,angle+slice), [ix1,iy1] = polar(rInner,angle);
    const largeArc = slice>180?1:0;
    paths += `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${rOuter},${rOuter} 0 ${largeArc} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${rInner},${rInner} 0 ${largeArc} 0 ${ix1.toFixed(2)},${iy1.toFixed(2)} Z" fill="${p.color}"/>`;
    angle += slice;
  }
  return `<svg width="140" height="140" viewBox="0 0 140 140">${paths}</svg>`;
}

function donutCardHtml(byPlat) {
  const total = byPlat.reduce((s,x)=>s+x.stats.spend,0);

    <div class="donut-legend-row">
      <span class="donut-dot" style="background:${p.color}"></span>
      <span>${p.label}</span>
      <span class="pct">${total>0 ? (p.value/total*100).toFixed(0)+'%' : '—'}</span>
    </div>`).join('');
  return `
    <div class="donut-wrap">

    </div>`;
}

// ── DATE PRESETS ─────────────────────────────────────────────────────────────
function periodToRange(period) {
  const today = new Date();
  if (period === '7') { const d=new Date(today); d.setDate(d.getDate()-7); return [fmtDate(d), todayStr]; }
  if (period === '14') { const d=new Date(today); d.setDate(d.getDate()-14); return [fmtDate(d), todayStr]; }
  if (period === 'lastweek') {
    const thisMon = startOfWeek(today);
    const lastMon = new Date(thisMon); lastMon.setDate(lastMon.getDate()-7);
    const lastSun = new Date(thisMon); lastSun.setDate(lastSun.getDate()-1);
    return [fmtDate(lastMon), fmtDate(lastSun)];
  }
  if (period === 'lastmonth') {
    const f = new Date(today.getFullYear(), today.getMonth()-1, 1);
    const t = new Date(today.getFullYear(), today.getMonth(), 0);
    return [fmtDate(f), fmtDate(t)];
  }
  const d = new Date(today); d.setDate(d.getDate()-7);
  return [fmtDate(d), todayStr];
}

function setPeriod(period) {
  filterState.period = period;
  const [from, to] = periodToRange(period);
  filterState.from = from; filterState.to = to;
  document.getElementById('filterFrom').value = from;
  document.getElementById('filterTo').value = to;
  document.querySelectorAll('#periodPills .pill').forEach(b => b.classList.toggle('active', b.dataset.period===period));
  renderContent();
}

function setMarket(market) {

}

// ── LOCAL QUERY PARSER (no API key needed) ──────────────────────────────────
const PLAT_KEYWORDS = {
  gads: ['googl','gads','adwords'],
  meta: ['met','facebook','fb','instagram','ig'],
  sklik: ['sklik','seznam'],
};
const MARKET_KEYWORDS = { cz: ['cz','česk','čr','czech'], sk: ['sk','slovens','slovak'] };
const METRIC_KEYWORDS = {
  clicks: ['klik','click'],
  impressions: ['zobrazen','imprese','impression'],
  conversions: ['konverz','conversion'],
  ctr: ['ctr'],
  cpc: ['cpc'],
  spend: ['spend','náklad','utrat','kolik','cena','peníze','penize'],
};
const MONTHS = ['leden','unor','brezen','duben','kveten','cerven','cervenec','srpen','zari','rijen','listopad','prosinec'];
const MONTH_NUM = {leden:1,unor:2,brezen:3,duben:4,kveten:5,cerven:6,cervenec:7,srpen:8,zari:9,rijen:10,listopad:11,prosinec:12};

function stripDia(s){ return s.normalize('NFD').replace(/[̀-ͯ]/g,''); }

function parseDateRange(qRaw) {
  const q = stripDia(qRaw);
  const today = new Date();
  if (/\bdnes\b/.test(q)) return [fmtDate(today), fmtDate(today)];
  if (/\bvcera\b/.test(q)) { const d=new Date(today); d.setDate(d.getDate()-1); return [fmtDate(d),fmtDate(d)]; }
  const nDays = q.match(/posledn\w*\s+(\d+)\s*d/);
  if (nDays) { const n=parseInt(nDays[1]); const d=new Date(today); d.setDate(d.getDate()-n); return [fmtDate(d), fmtDate(today)]; }
  if (/minul\w*\s+tyd\w*/.test(q)) {
    const thisMon = startOfWeek(today);
    const lastMon = new Date(thisMon); lastMon.setDate(lastMon.getDate()-7);
    const lastSun = new Date(thisMon); lastSun.setDate(lastSun.getDate()-1);
    return [fmtDate(lastMon), fmtDate(lastSun)];
  }
  if (/tento\s+tyd\w*|tomto\s+tyd\w*/.test(q)) return [fmtDate(startOfWeek(today)), fmtDate(today)];
  if (/minul\w*\s+mesic\w*/.test(q)) {
    const f = new Date(today.getFullYear(), today.getMonth()-1, 1);
    const t = new Date(today.getFullYear(), today.getMonth(), 0);
    return [fmtDate(f), fmtDate(t)];
  }
  if (/tento\s+mesic\w*|tomto\s+mesic\w*/.test(q)) return [fmtDate(new Date(today.getFullYear(), today.getMonth(), 1)), fmtDate(today)];
  for (const m of MONTHS) {
    if (q.includes(m)) {
      const num = MONTH_NUM[m];
      const yMatch = q.match(/20\d{2}/);
      const y = yMatch ? parseInt(yMatch[0]) : today.getFullYear();
      const f = new Date(y, num-1, 1);
      const t = new Date(y, num, 0);
      return [fmtDate(f), fmtDate(t)];
    }
  }
  const explicit = q.match(/(\d{4}-\d{2}-\d{2}).{1,5}(\d{4}-\d{2}-\d{2})/);
  if (explicit) return [explicit[1], explicit[2]];
  const d = new Date(today); d.setDate(d.getDate()-7);
  return [fmtDate(d), fmtDate(today)];
}

function detectKeywords(qRaw, dict) {
  const q = stripDia(qRaw);
  const found = [];
  for (const [key, words] of Object.entries(dict)) {
    if (words.some(w => new RegExp('\\b'+stripDia(w)+'\\w*','i').test(q))) found.push(key);
  }
  return found;
}

function metricLabel(m){ return {spend:'spend',clicks:'kliky',impressions:'zobrazení',conversions:'konverze',ctr:'CTR',cpc:'CPC'}[m]; }

function computeMetric(stats, metric, cur) {
  if (metric==='clicks') return fn(stats.clicks);
  if (metric==='impressions') return fn(stats.impressions);
  if (metric==='conversions') return fn(Math.round(stats.conversions||0));
  if (metric==='ctr') return fpct(stats.clicks, stats.impressions);
  if (metric==='cpc') return fcpc(stats.spend, stats.clicks) + ' ' + cur;
  return f(stats.spend, cur);
}

function answerQuestion(q) {
  const ql = q.toLowerCase();
  let plats = detectKeywords(ql, PLAT_KEYWORDS);
  let markets = detectKeywords(ql, MARKET_KEYWORDS);
  let metrics = detectKeywords(ql, METRIC_KEYWORDS);
  const [from, to] = parseDateRange(ql);
  const metric = metrics[0] || 'spend';

  if (!markets.length) markets = ['cz','sk'];
  if (!plats.length) plats = null;

  const fromFmt = new Date(from+'T12:00:00').toLocaleDateString('cs-CZ');
  const toFmt   = new Date(to+'T12:00:00').toLocaleDateString('cs-CZ');
  const lines = [`Období: ${fromFmt} – ${toFmt}`];

  for (const market of markets) {
    const cur = market==='cz' ? 'Kč' : '€';
    const availPlats = market==='cz' ? ['gads','sklik','meta'] : ['gads','meta'];
    const usePlats = plats ? plats.filter(p=>availPlats.includes(p)) : availPlats;
    if (plats && !usePlats.length) continue;

    if (!plats) {
      const stats = aggOverview(allData, market, availPlats, from, to);
      lines.push(`${market.toUpperCase()} celkem (vše): ${metricLabel(metric)} = ${computeMetric(stats, metric, cur)}`);
    } else {
      for (const p of usePlats) {
        const stats = aggPlatform(allData, market, p, from, to);
        const isEmptyGads = p==='gads' && stats.spend===0 && stats.clicks===0 && stats.impressions===0;
        const note = isEmptyGads ? ' (Google Ads ještě nemá data — čeká se na schválení API)' : '';
        lines.push(`${market.toUpperCase()} – ${NAMES[p]}: ${metricLabel(metric)} = ${computeMetric(stats, metric, cur)}${note}`);
      }
    }
  }
  return lines.join('\n');
}

function askAi() {
  const input = document.getElementById('aiInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  addAiMsg(q, 'user');
  try {
    const answer = answerQuestion(q);
    addAiMsg(answer, 'bot');
  } catch(e) {
    addAiMsg('Nerozuměla jsem otázce — zkus zmínit platformu (Google/Meta/Sklik), zemi (CZ/SK) a období (např. "minulý týden").', 'bot');
  }
}

          <button class="pill ${filterState.period==='14'?'active':''}" data-period="14" onclick="setPeriod('14')">14 dní</button>
          <button class="pill ${filterState.period==='lastweek'?'active':''}" data-period="lastweek" onclick="setPeriod('lastweek')">Minulý týden</button>
          <button class="pill ${filterState.period==='lastmonth'?'active':''}" data-period="lastmonth" onclick="setPeriod('lastmonth')">Minulý měsíc</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Vlastní rozsah</span>
        <div class="range-row">
          <input type="date" id="filterFrom" value="${from}" onchange="setCustomRange()">
          <span class="sep">–</span>
          <input type="date" id="filterTo" value="${to}" onchange="setCustomRange()">
        </div>
      </div>
    </div>
    ${body}
    <div class="footer">Data ${fromFmt} – ${toFmt} · obnovuje se každých 5 min</div>`;

  if (market === 'czsk') {
    refreshMarketSection('cz', from, to);
    refreshMarketSection('sk', from, to);
  } else {
    refreshMarketSection(market, from, to);
  }
}

async function render() {
  document.getElementById('content').innerHTML = '<div class="loading">Načítám…</div>';
  const data = await loadAllData();
  if (!data || !Object.keys(data).length) {
    document.getElementById('content').innerHTML = '<div class="no-data" style="padding:60px">⚠ Žádná data</div>';
    return;
  }
  const [from, to] = periodToRange('7');
  filterState.from = from; filterState.to = to;
  renderContent();
}

// render() se spusti az po desifraci (_initDashboard -> _renderMain)
window._renderMain = render;
// Auto-refresh kazdych 5 minut (jen kdyz uz jsou data)
setInterval(() => { if (allData) { allData = null; metaStructure = null; render(); } }, 5*60*1000);
</script>
</body>
</html>
